<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Cafe By Nicolette</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0f0f0f;color:#fff;overflow-x:hidden}

header{
height:100vh;
background:url('https://drive.google.com/file/d/1yy8Cs89bdSRN_VyE2gkuAvPgZfXy86rR/view?usp=drive_link') center/cover no-repeat fixed;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center
}

header h1{
font-size:4rem;
background:rgba(0,0,0,0.5);
padding:20px 40px;
border-radius:20px;
backdrop-filter:blur(10px);
animation:fadeIn 1.5s ease
}

section{
padding:100px 20px;
max-width:1100px;
margin:auto;
opacity:0;
transform:translateY(40px);
transition:all .8s ease
}

section.show{opacity:1;transform:translateY(0)}

h2{font-size:2.5rem;margin-bottom:20px}

/* SLIDER */
.slider{
position:relative;
overflow:hidden;
border-radius:20px
}

.slides{
display:flex;
transition:transform .6s ease
}

.slide{
min-width:100%;
height:400px
}

.slide img{
width:100%;
height:100%;
object-fit:cover
}

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
border:none;
color:#fff;
font-size:2rem;
padding:10px;
cursor:pointer;
border-radius:50%
}

.prev{left:10px}
.next{right:10px}

.dots{
text-align:center;
margin-top:15px
}

.dot{
height:10px;width:10px;
margin:5px;
background:#777;
border-radius:50%;
display:inline-block;
cursor:pointer
}

.dot.active{background:#fff}

.map iframe{
width:100%;
height:400px;
border:0;
border-radius:20px;
filter:grayscale(100%) invert(90%)
}

footer{text-align:center;padding:40px;background:#000;opacity:.7}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<h1>Bloom Cafe By Nicolette ☕</h1>
<p>American Style Coffee & Brunch Spot</p>
</header>

<section>
<h2>O nas</h2>

</section>

<section>
<h2>Galeria</h2>

<div class="slider">
<div class="slides" id="slides">

<!-- WSTAW SWOJE ZDJĘCIA Z DRIVE -->

<div class="slide"><img src="https://drive.google.com/file/d/1nMxc9woJRMCYkczgxxpHbBUxk3bmSJxy/view?usp=drive_link"></div>

<button class="nav-btn prev" onclick="moveSlide(-1)">‹</button>

<footer>
<p>© 2026 Bloom Cafe By Nicolette</p>
</footer>

<script>
let index = 0;
const slides = document.getElementById('slides');
const total = slides.children.length;
const dotsContainer = document.getElementById('dots');

for(let i=0;i<total;i++){
let dot=document.createElement('span');
dot.classList.add('dot');
dot.onclick=()=>goToSlide(i);
dotsContainer.appendChild(dot);
}

function updateSlider(){
slides.style.transform=`translateX(-${index*100}%)`;
[...dotsContainer.children].forEach(d=>d.classList.remove('active'));
dotsContainer.children[index].classList.add('active');
}

function moveSlide(step){
index=(index+step+total)%total;
updateSlider();
}

function goToSlide(i){
index=i;
updateSlider();
}

setInterval(()=>moveSlide(1),5000);
updateSlider();

// scroll animation
const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')})
},{threshold:.2});
sections.forEach(s=>observer.observe(s));
</script>

</body>
</html>

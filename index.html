<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kawiarnia Aroma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3ef;
      color: #333;
    }
    header {
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') center/cover;
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    header h1 {
      font-size: 3em;
      background: rgba(0,0,0,0.5);
      padding: 20px;
    }
    section {
      padding: 50px 20px;
      max-width: 1000px;
      margin: auto;
    }
    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .item {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }
    button {
      background: #6b4f4f;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
<h1>Bloom Cafe By Nicolette ☕</h1>
<p>American Style Coffee & Brunch Spot</p>
</header>

<section>
<h2>O nas</h2>
<p>Nowoczesna kawiarnia inspirowana Nowym Jorkiem — idealna pod Instagram.</p>
</section>

<section>
<h2>Galeria</h2>

<div class="slider">
<div class="slides" id="slides">

<img src="/images/pierwsze.jpg">
<img src="/images/1.jpg">
<img src="/images/2.jpg">
<img src="/images/3.jpg">
<img src="/images/4.jpg">
<img src="/images/5.jpg">
<img src="/images/6.jpg">
<img src="/images/7.jpg">
<img src="/images/8.jpg">
<img src="/images/9.jpg">
<img src="/images/10.jpg">
<img src="/images/11.jpg">
<img src="/images/12.jpg">
<img src="/images/13.jpg">

</div>

<button class="nav-btn prev" onclick="moveSlide(-1)">‹</button>
<button class="nav-btn next" onclick="moveSlide(1)">›</button>
</div>

<div class="dots" id="dots"></div>

</section>

<section>
<h2>Lokalizacja</h2>
<p>📍 Polskich Kolejarzy 5/lok 8-9, Pruszcz Gdański</p>

<div class="map">
<iframe src="https://www.google.com/maps?q=Polskich+Kolejarzy+5+Pruszcz+Gdanski&z=17&output=embed"></iframe>
</div>
</section>

<footer>
<p>© 2026 Bloom Cafe By Nicolette</p>
</footer>

<script>
let index = 0;
const slides = document.getElementById('slides');
const total = slides.children.length;
const dotsContainer = document.getElementById('dots');

for(let i=0;i<total;i++){
let dot=document.createElement('span');
dot.classList.add('dot');
dot.onclick=()=>goToSlide(i);
dotsContainer.appendChild(dot);
}

function updateSlider(){
slides.style.transform=`translateX(-${index*100}%)`;
[...dotsContainer.children].forEach(d=>d.classList.remove('active'));
dotsContainer.children[index].classList.add('active');
}

function moveSlide(step){
index=(index+step+total)%total;
updateSlider();
}

function goToSlide(i){
index=i;
updateSlider();
}

setInterval(()=>moveSlide(1),5000);
updateSlider();

// scroll animation
const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')})
},{threshold:.2});
sections.forEach(s=>observer.observe(s));
</script>

</body>
</html>
